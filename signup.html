<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackVerse - Authenticate</title>
    <link rel="stylesheet" href="css/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap">
    </noscript>
</head>
<body>
    <div class="auth-container">
        <!-- LEFT PANEL (Artwork & Brand Content) -->
        <div class="auth-visual-panel">
            <a href="index.html" class="auth-logo-overlay" aria-label="HackVerse Home">
                <img src="assets/avatar/yes.webp" alt="HackVerse Logo" class="nav-logo-img">
                <span class="nav-logo-text">Hack<span class="text-accent">Verse</span></span>
            </a>
            
            <div class="auth-visual-bg" style="background-image: url('assets/auth-hero.png');"></div>
            <div class="auth-visual-overlay"></div>
            
            <div class="auth-visual-content">
                <h1 class="visual-title">Create Your Vision</h1>
                <p class="visual-subtitle">AI-assisted workspace to craft and elevate your ideas.</p>
            </div>
        </div>

        <!-- RIGHT PANEL (Form Section) -->
        <div class="auth-form-panel">
            <div class="auth-form-wrapper">
                <!-- Segmented Tab Control -->
                <div class="tab-control-container">
                    <div class="tab-slider"></div>
                    <button type="button" class="tab-btn active" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
                    <button type="button" class="tab-btn" id="tab-login" onclick="switchTab('login')">Log In</button>
                </div>

                <!-- SIGN UP FORM -->
                <div class="form-container active" id="signup-container">
                    <h2 class="form-title">Create An Account</h2>
                    <form id="signup-form" novalidate>
                        <div class="input-row">
                            <div class="input-group">
                                <input type="text" id="signup-firstname" placeholder="First Name" required autocomplete="given-name">
                            </div>
                            <div class="input-group">
                                <input type="text" id="signup-lastname" placeholder="Last Name" required autocomplete="family-name">
                            </div>
                        </div>
                        
                        <div class="input-group icon-input">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>
                            <input type="email" id="signup-email" placeholder="Enter Your Email" required autocomplete="email">
                        </div>

                        <div class="input-row" style="margin-top: 16px;">
                            <div class="input-group">
                                <select id="signup-role" required style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #fff; font-family: inherit; font-size: 0.9rem;">
                                    <option value="" disabled selected style="color:#888">Primary Role</option>
                                    <option value="Frontend Dev" style="color:#000">Frontend Dev</option>
                                    <option value="Backend Dev" style="color:#000">Backend Dev</option>
                                    <option value="Full Stack Dev" style="color:#000">Full Stack Dev</option>
                                    <option value="UI/UX Designer" style="color:#000">UI/UX Designer</option>
                                    <option value="ML/AI Engineer" style="color:#000">ML/AI Engineer</option>
                                    <option value="Product Manager" style="color:#000">Product Manager</option>
                                    <option value="Other" style="color:#000">Other</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <select id="signup-experience" required style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #fff; font-family: inherit; font-size: 0.9rem;">
                                    <option value="" disabled selected style="color:#888">Experience</option>
                                    <option value="Student" style="color:#000">Student</option>
                                    <option value="Beginner (0-1 yr)" style="color:#000">Beginner (0-1 yr)</option>
                                    <option value="Intermediate (1-3 yrs)" style="color:#000">Intermediate (1-3 yrs)</option>
                                    <option value="Advanced (3+ yrs)" style="color:#000">Advanced (3+ yrs)</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group icon-input" style="margin-top: 16px;">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                            </span>
                            <input type="url" id="signup-github" placeholder="GitHub URL (Optional)">
                        </div>

                        <div class="input-group" style="margin-top: 16px; margin-bottom: 16px;">
                            <input type="text" id="signup-skills" placeholder="Skills (e.g. React, Node.js, Python)">
                        </div>

                        <div class="input-group icon-input password-group">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="signup-password" placeholder="Password" required autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signup-password', this)">
                                <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                                <svg class="eye" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>

                        <!-- Password Strength Indicator -->
                        <div class="pw-strength-container" style="margin-top: -8px; margin-bottom: 16px;">
                            <div class="pw-strength-bars" style="display: flex; gap: 6px; height: 4px;">
                                <div class="pw-bar" style="flex: 1; height: 100%; background: rgba(255,255,255,0.07); border-radius: 2px; transition: background 0.2s;"></div>
                                <div class="pw-bar" style="flex: 1; height: 100%; background: rgba(255,255,255,0.07); border-radius: 2px; transition: background 0.2s;"></div>
                                <div class="pw-bar" style="flex: 1; height: 100%; background: rgba(255,255,255,0.07); border-radius: 2px; transition: background 0.2s;"></div>
                            </div>
                            <span class="pw-strength-text" style="font-size: 0.75rem; color: #808080; display: block; margin-top: 4px; font-family: 'DM Sans', sans-serif;">Password strength</span>
                        </div>

                        <div class="input-group icon-input password-group">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </span>
                            <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signup-confirm-password', this)">
                                <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                                <svg class="eye" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>

                        <button type="submit" class="auth-submit-btn">Create an Account</button>
                    </form>
                </div>

                <!-- LOG IN FORM -->
                <div class="form-container" id="login-container">
                    <h2 class="form-title">Welcome Back</h2>
                    <form id="login-form" novalidate>
                        <div class="input-group icon-input">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>
                            <input type="email" id="login-email" placeholder="Enter Your Email" required autocomplete="email">
                        </div>

                        <div class="input-group icon-input password-group">
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('login-password', this)">
                                <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                                <svg class="eye" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>

                        <button type="submit" class="auth-submit-btn">Log In</button>
                    </form>
                </div>


            </div>
        </div>
    </div>

    <!-- Error Toast Notification Container -->
    <div id="toast-container"></div>

    <script>
        // Tab switching logic
        function switchTab(mode) {
            const signupBtn = document.getElementById('tab-signup');
            const loginBtn = document.getElementById('tab-login');
            const signupForm = document.getElementById('signup-container');
            const loginForm = document.getElementById('login-container');
            const slider = document.querySelector('.tab-slider');

            if (mode === 'signup') {
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                slider.style.transform = 'translateX(0)';
            } else {
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                slider.style.transform = 'translateX(100%)';
            }
            
            // Update URL search query
            const url = new URL(window.location);
            url.searchParams.set('mode', mode);
            window.history.replaceState({}, '', url);
        }

        // Toggle password helper
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeOff = btn.querySelector('.eye-off');
            const eye = btn.querySelector('.eye');
            if (input.type === 'password') {
                input.type = 'text';
                eyeOff.style.display = 'none';
                eye.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOff.style.display = 'block';
                eye.style.display = 'none';
            }
        }

        // Show Toast helper
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);

            // Remove toast after 4s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Parse query params on load
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode') || 'signup';
            switchTab(mode);
        });

        // Form Submission Logic
        const getRedirectUrl = () => {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect') ? decodeURIComponent(params.get('redirect')) : 'index.html';
        };

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const firstname = document.getElementById('signup-firstname').value.trim();
            const lastname = document.getElementById('signup-lastname').value.trim();
            const email = document.getElementById('signup-email').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value.trim();
            const confirmPassword = document.getElementById('signup-confirm-password').value.trim();

            const role = document.getElementById('signup-role').value;
            const experience = document.getElementById('signup-experience').value;
            const github = document.getElementById('signup-github').value.trim();
            const skillsStr = document.getElementById('signup-skills').value.trim();

            if (!firstname || !lastname) {
                showToast("Please enter both first and last name.");
                return;
            }
            if (!email) {
                showToast("Please enter your email.");
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast("Please enter a valid email address.");
                return;
            }
            if (!role || !experience) {
                showToast("Please select your role and experience.");
                return;
            }
            if (password.length < 6) {
                showToast("Password must be at least 6 characters.");
                return;
            }
            if (password !== confirmPassword) {
                showToast("Passwords do not match.");
                return;
            }

            const name = `${firstname} ${lastname}`;
            const skills = skillsStr.split(',').map(s => s.trim()).filter(Boolean);
            
            const AVATARS = [
                'assets/avatar/a1.webp', 'assets/avatar/a2.webp', 'assets/avatar/a3.webp', 
                'assets/avatar/a4.webp', 'assets/avatar/a5.webp', 'assets/avatar/a6.webp', 
                'assets/avatar/a7.webp', 'assets/avatar/a8.webp', 'assets/avatar/a9.webp', 
                'assets/avatar/a10.webp', 'assets/avatar/a11.webp'
            ];
            const randomAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];

            try {
                const profilesStr = localStorage.getItem('hk_profiles');
                const profiles = profilesStr ? JSON.parse(profilesStr) : {};
                
                // Check if user already exists
                if (profiles[email]) {
                    showToast("User already exists. Please log in.");
                    return;
                }
                
                profiles[email] = {
                    name: name,
                    email: email,
                    role: role,
                    experience: experience,
                    github: github,
                    skills: skills,
                    avatar: randomAvatar,
                    password: password // Storing password for mock authentication
                };
                
                localStorage.setItem('hk_profiles', JSON.stringify(profiles));
                localStorage.setItem('hk_profile', JSON.stringify(profiles[email]));
                localStorage.setItem('hackhub_user', JSON.stringify({ name, email }));

                // Login the user automatically after successful signup
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUserEmail', email);
                localStorage.setItem('needsOnboarding', 'true');
            } catch(err) {
                console.error("Error setting profile:", err);
            }

            showToast("Account created successfully! Redirecting...", "success");
            
            // Redirect
            setTimeout(() => {
                window.location.href = getRedirectUrl();
            }, 1200);
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value.trim();

            if (!email) {
                showToast("Please enter your email.");
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast("Please enter a valid email address.");
                return;
            }
            if (!password) {
                showToast("Please enter your password.");
                return;
            }

            // Verify login
            try {
                const profilesStr = localStorage.getItem('hk_profiles');
                const profiles = profilesStr ? JSON.parse(profilesStr) : {};
                
                let p = profiles[email];
                if (!p) {
                    showToast("Account not found. Please sign up.");
                    return;
                }
                
                // If the profile has a password, verify it. 
                // (Older accounts might not have a password, so we let them in to avoid breaking demo state)
                if (p.password && p.password !== password) {
                    showToast("Invalid password.");
                    return;
                }

                // Successful login
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUserEmail', email);
                localStorage.setItem('hk_profile', JSON.stringify(p));
                localStorage.setItem('hackhub_user', JSON.stringify({ name: p.name, email: p.email }));
            } catch(err) {
                console.error("Login error:", err);
                showToast("An error occurred during login.");
                return;
            }

            showToast("Logged in successfully! Redirecting...", "success");
            
            // Redirect
            setTimeout(() => {
                window.location.href = getRedirectUrl();
            }, 1200);
        });

        // Password strength checker
        const pwInput = document.getElementById('signup-password');
        const pwBars = document.querySelectorAll('.pw-bar');
        const pwText = document.querySelector('.pw-strength-text');

        if (pwInput && pwBars.length && pwText) {
            pwInput.addEventListener('input', () => {
                const val = pwInput.value;
                let score = 0;
                if (val.length >= 6) score = 1;
                if (val.length >= 6 && /[0-9!@#$%^&*]/.test(val)) score = 2;
                if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[!@#$%^&*]/.test(val)) score = 3;

                // Reset bars
                pwBars.forEach((bar, idx) => {
                    if (idx < score) {
                        if (score === 1) {
                            bar.style.backgroundColor = '#ef4444'; // Red
                        } else if (score === 2) {
                            bar.style.backgroundColor = '#f59e0b'; // Amber
                        } else if (score === 3) {
                            bar.style.backgroundColor = '#10b981'; // Green
                        }
                    } else {
                        bar.style.backgroundColor = 'rgba(255, 255, 255, 0.07)';
                    }
                });

                if (val.length === 0) {
                    pwText.innerText = 'Password strength';
                    pwText.style.color = '#808080';
                } else if (score === 1) {
                    pwText.innerText = 'Weak password';
                    pwText.style.color = '#ef4444';
                } else if (score === 2) {
                    pwText.innerText = 'Medium password';
                    pwText.style.color = '#f59e0b';
                } else if (score === 3) {
                    pwText.innerText = 'Strong password';
                    pwText.style.color = '#10b981';
                }
            });
        }
    </script>
</body>
</html>
